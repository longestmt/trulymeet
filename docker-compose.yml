services:
  app:
    image: ghcr.io/longestmt/trulymeet:latest
    environment:
      DATABASE_URL: postgres://trulymeet:trulymeet@db:5432/trulymeet
      BASE_URL: https://meet.example.com
      EVENT_RETENTION_DAYS: 30
      RATE_LIMIT_EVENTS_PER_HOUR: 10
      RATE_LIMIT_SUBMISSIONS_PER_HOUR: 60
    ports:
      - "3988:3988"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: trulymeet
      POSTGRES_PASSWORD: trulymeet
      POSTGRES_DB: trulymeet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U trulymeet" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
